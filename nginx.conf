server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver: Docker 内部 DNS，禁用 IPv6 防止连接失败
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Basic Auth 认证
    auth_basic "Ankimo Login";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # 静态文件
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理 AnkiConnect API（使用变量让 resolver 生效）
    location /anki {
        set $anki_upstream http://host.docker.internal:8765;
        proxy_pass $anki_upstream/;
        proxy_set_header Host localhost;
        proxy_set_header Origin http://localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type application/json;
        proxy_read_timeout 30s;
    }

    # 代理 MiniMax TTS API（解决前端跨域）
    location /api/tts {
        # 关闭 Basic Auth（前端已经过认证，TTS 用自己的 API Key）
        auth_basic off;

        proxy_pass https://api.minimaxi.com/v1/t2a_v2;
        proxy_ssl_server_name on;
        proxy_set_header Host api.minimaxi.com;
        proxy_set_header Content-Type application/json;

        # 将前端 X-API-Key header 转换为 Authorization: Bearer
        set $api_key $http_x_api_key;
        proxy_set_header Authorization "Bearer $api_key";

        # 移除前端自定义 header，不转发给上游
        proxy_set_header X-API-Key "";

        proxy_read_timeout 30s;
    }
}
